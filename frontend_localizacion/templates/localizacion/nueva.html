{% extends "base.html" %}

{% block title %}Publicar Fiesta{% endblock %}

{% block content %}
<a href="/localizacion/" class="btn btn-secondary" style="margin-bottom:1.5rem; display:inline-block;">← Volver al mapa</a>

<h1>📍 Publicar nueva fiesta</h1>

{% if mensaje %}
<div class="alert alert-success">✅ {{ mensaje }}</div>
{% endif %}
{% if error %}
<div class="alert alert-error">⚠️ {{ error }}</div>
{% endif %}

<div class="card">
  <form method="POST">
    {% csrf_token %}
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div class="form-group" style="grid-column:1/-1;">
        <label>Nombre de la fiesta *</label>
        <input type="text" name="nombre" placeholder="Ej: Noche de Verano" required />
      </div>

      <div class="form-group" style="grid-column:1/-1;">
        <label>Ubicación (dirección o descripción) *</label>
        <input type="text" name="ubicacion" placeholder="Ej: Finca Los Pinos, Cartago" required />
      </div>

      <div class="form-group">
        <label>Latitud (opcional)</label>
        <input type="number" name="latitud" step="any" placeholder="Ej: 9.9341" />
      </div>

      <div class="form-group">
        <label>Longitud (opcional)</label>
        <input type="number" name="longitud" step="any" placeholder="Ej: -84.0603" />
      </div>

      <div class="form-group">
        <label>Fecha *</label>
        <input type="date" name="fecha" required />
      </div>

      <div class="form-group">
        <label>Hora *</label>
        <input type="time" name="hora" required />
      </div>

      <div class="form-group">
        <label>Capacidad máxima *</label>
        <input type="number" name="capacidad" min="1" max="500" placeholder="Ej: 80" required />
      </div>

      <div class="form-group" style="grid-column:1/-1;">
        <label>Descripción</label>
        <textarea name="descripcion" rows="3" placeholder="Detalles adicionales, código de vestimenta, etc."></textarea>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">Publicar fiesta</button>
  </form>
</div>
{% endblock %}
